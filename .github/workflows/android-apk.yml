name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle -p android :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: leeao-books-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk leeao-books-debug.apk
          if gh release view android-debug-latest >/dev/null 2>&1; then
            gh release upload android-debug-latest leeao-books-debug.apk --clobber
          else
            gh release create android-debug-latest leeao-books-debug.apk \
              --title "Android APK 最新测试版" \
              --notes "自动构建的 Android debug APK。手机安装时需要允许安装未知来源应用。" \
              --prerelease
          fi
