[book]
authors = ["李敖", "wjm_tcy"]
language = "zh-CN"
multilingual = false
src = "./"
title = "大李敖全集6.0"

[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]

[preprocessor.open-on-gh]
command = "mdbook-open-on-gh"
renderer = ["html"]

[output.html]
additional-css = ["theme/language-toggle.css", "theme/feedback-box.css"]
additional-js = ["theme/language-toggle.js", "theme/feedback-box.js"]
git-repository-url = "https://golgo11.github.io/lee-ao"
git-branch = "master"

[output.html.print]
# print超过github上限50MB，于是默认关闭
enable = false

[output.html.search]
# search超过github上限100MB，于是默认关闭
enable = false
